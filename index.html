<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>AR Product Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    .header {
      background: linear-gradient(135deg, #0d6efd, #003b8e);
      color: white;
      padding: 35px 15px;
      text-align: center;
      border-radius: 0 0 28px 28px;
      margin-bottom: 25px;
      position: relative;
    }

    .header-logo {
      position: absolute;
      left: 20px;
      top: 20px;
      height: 60px;
      filter: brightness(0) invert(1);
    }

    .model-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      height: 100%;
      transition: transform 0.2s;
    }

    .model-card:hover {
      transform: translateY(-5px);
    }

    .model-img {
      height: 170px;
      object-fit: cover;
      background: #e9ecef;
    }

    .btn-view {
      border-radius: 50px;
    }

    .menu-btn {
      font-size: 20px;
      padding: 16px;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
    }
  </style>
</head>
<body>

<div class="header">
  <img src="assets/img/logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
  <h1>AR Product Catalog</h1>
  <p class="mb-0">เลือก Model ที่ต้องการดูรายละเอียด</p>
</div>

<div class="container pb-5">
  <div class="row g-4" id="modelList"></div>
</div>

<div id="loading">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <h4 class="mt-3">Loading...</h4>
</div>

<script>
// ตรวจสอบว่า models.js โหลดมาก่อนหรือยัง
window.onload = () => {
  if (typeof models !== 'undefined' && models.length > 0) {
    displayModels();
  } else {
    document.getElementById("modelList").innerHTML = `
      <div class="col-12">
        <div class="alert alert-danger text-center">
          ไม่สามารถโหลดข้อมูลสินค้าได้ กรุณาตรวจสอบไฟล์ models.js
        </div>
      </div>
    `;
  }
  document.getElementById("loading").style.display = "none";
}

function displayModels() {
  const modelList = document.getElementById("modelList");
  modelList.innerHTML = '';
  
  models.forEach(item => {
    modelList.innerHTML += `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card model-card">
          <img src="${item.image || 'assets/img/placeholder.jpg'}" class="card-img-top model-img" alt="${item.name}" onerror="this.src='assets/img/placeholder.jpg'">
          <div class="card-body text-center">
            <h5 class="card-title">${escapeHtml(item.name)}</h5>
            <p class="text-muted mb-2">${escapeHtml(item.brand)}</p>
            <a href="model.html?id=${item.id}" class="btn btn-primary btn-view w-100">
              View Detail
            </a>
          </div>
        </div>
      </div>
    `;
  });
}

// ป้องกัน XSS attacks
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>

<script src="assets/data/models.js"></script>

<!-- เพิ่ม Bootstrap JS สำหรับ interactive components -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
