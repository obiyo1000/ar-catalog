<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>AR Product Catalog - Medical Equipment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .header {
      background: linear-gradient(135deg, #0d6efd, #003b8e);
      color: white;
      padding: 35px 15px;
      text-align: center;
      border-radius: 0 0 28px 28px;
      margin-bottom: 25px;
    }

    .model-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      height: 100%;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .model-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
    }

    .model-img {
      height: 200px;
      object-fit: contain;
      background: #ffffff;
      width: 100%;
      padding: 12px;
    }

    .btn-view {
      border-radius: 50px;
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      border: none;
    }

    .brand-badge {
      background: #e9ecef;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #495057;
      display: inline-block;
    }

    .search-box {
      max-width: 420px;
      margin: 0 auto 30px auto;
    }

    .search-box input {
      border-radius: 50px;
      padding: 12px 20px;
      border: 2px solid #dee2e6;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
    }
  </style>
</head>

<body>

<div class="header">
  <h1><i class="fas fa-microscope"></i> AR Product Catalog</h1>
  <p class="mb-0">Medical Diagnostic Equipment</p>
  <p class="small mt-2 mb-0">เลือกสินค้าเพื่อดู Catalog, Video, Spec และ Model AR</p>
</div>

<div class="container pb-5">
  <div class="row g-4" id="modelList"></div>
</div>

<div id="loading">
  <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <h4 class="mt-3">กำลังโหลดข้อมูล...</h4>
</div>

<script src="assets/data/models.js"></script>

<script>
  let allModels = [];

  window.addEventListener('load', function () {
    if (typeof models !== 'undefined' && Array.isArray(models) && models.length > 0) {
      allModels = models;
      displayModels(allModels);
    } else {
      showLoadError();
    }

    document.getElementById("loading").style.display = "none";
  });

  function displayModels(modelsToShow) {
    const modelList = document.getElementById("modelList");
    modelList.innerHTML = "";

    if (!modelsToShow || modelsToShow.length === 0) {
      modelList.innerHTML = `
        <div class="col-12">
          <div class="alert alert-info text-center">
            <i class="fas fa-search"></i> ไม่พบสินค้าที่ต้องการค้นหา
          </div>
        </div>
      `;
      return;
    }

    modelsToShow.forEach(item => {
      modelList.innerHTML += `
        <div class="col-6 col-md-4 col-lg-3">
          <div class="card model-card">
            <img src="${item.image || 'assets/img/placeholder.jpg'}"
                 class="card-img-top model-img"
                 alt="${escapeHtml(item.name)}"
                 onerror="this.src='assets/img/placeholder.jpg'">

            <div class="card-body text-center">
              <h5 class="card-title">${escapeHtml(item.name)}</h5>

              <span class="brand-badge mb-2">
                <i class="fas fa-tag"></i> ${escapeHtml(item.brand)}
              </span>

              <p class="text-muted small mt-2">${escapeHtml(item.description)}</p>

              <a href="model.html?id=${encodeURIComponent(item.id)}" class="btn btn-primary btn-view w-100 mt-2">
                <i class="fas fa-info-circle"></i> View Detail
              </a>
            </div>
          </div>
        </div>
      `;
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    const searchInput = document.getElementById('searchInput');

    searchInput.addEventListener('keyup', function () {
      const searchTerm = this.value.toLowerCase().trim();

      const filtered = allModels.filter(item =>
        String(item.name || '').toLowerCase().includes(searchTerm) ||
        String(item.brand || '').toLowerCase().includes(searchTerm) ||
        String(item.description || '').toLowerCase().includes(searchTerm)
      );

      displayModels(filtered);
    });
  });

  function showLoadError() {
    document.getElementById("modelList").innerHTML = `
      <div class="col-12">
        <div class="alert alert-danger text-center">
          <i class="fas fa-exclamation-triangle"></i>
          ไม่สามารถโหลดข้อมูลสินค้าได้ กรุณาตรวจสอบไฟล์ assets/data/models.js
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
