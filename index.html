<!DOCTYPE html>
<html lang="th">
<head>
  <img src="assets/img/logo.png" style="height:60px;">
  <meta charset="UTF-8">
  <title>AR Product Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="assets/data/models.js"></script>

  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    .header {
      background: linear-gradient(135deg, #0d6efd, #003b8e);
      color: white;
      padding: 35px 15px;
      text-align: center;
      border-radius: 0 0 28px 28px;
      margin-bottom: 25px;
    }

    .model-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      height: 100%;
    }

    .model-img {
      height: 170px;
      object-fit: cover;
      background: #e9ecef;
    }

    .btn-view {
      border-radius: 50px;
    }
    .menu-btn {
      font-size: 20px;
      padding: 16px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>AR Product Catalog</h1>
  <p class="mb-0">เลือก Model ที่ต้องการดูรายละเอียด</p>
</div>

<div class="container pb-5">
  <div class="row g-4" id="modelList"></div>
</div>

<div id="loading" style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;">
  <h4>Loading...</h4>
</div>

<script>
window.onload = () => {
  document.getElementById("loading").style.display = "none";
}
</script>

<script>
  const modelList = document.getElementById("modelList");

  models.forEach(item => {
    modelList.innerHTML += `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card model-card">
          <img src="${item.image}" class="card-img-top model-img" alt="${item.name}">
          <div class="card-body text-center">
            <h5 class="card-title">${item.name}</h5>
            <p class="text-muted mb-2">${item.brand}</p>
            <a href="model.html?id=${item.id}" class="btn btn-primary btn-view w-100">
              View Detail
            </a>
          </div>
        </div>
      </div>
    `;
  });
</script>

</body>
</html>
