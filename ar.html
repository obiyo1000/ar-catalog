<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Model AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .ar-card {
      border: none;
      border-radius: 22px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .ar-button {
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 16px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>

<body>

<div class="container py-4">

  <a id="backBtn" href="index.html" class="btn btn-secondary mb-3">
    ← กลับ
  </a>

  <div id="content"></div>

</div>

<script src="assets/data/models.js"></script>

<script>
  function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id"), 10);
  const model = models.find(item => Number(item.id) === id);
  const content = document.getElementById("content");
  const backBtn = document.getElementById("backBtn");

  if (!model) {
    content.innerHTML = `
      <div class="alert alert-danger text-center">
        ไม่พบข้อมูล Model
      </div>
    `;
  } else {
    document.title = `${model.name} AR`;
    backBtn.href = `model.html?id=${model.id}`;

    const glb = model.glb || "";
    const usdz = model.usdz || "";

    if (!glb) {
      content.innerHTML = `
        <div class="alert alert-warning text-center">
          ยังไม่ได้เพิ่มไฟล์ GLB สำหรับ ${escapeHtml(model.name)}
        </div>
      `;
    } else {
      content.innerHTML = `
        <div class="card ar-card">
          <div class="card-body text-center">

            <h3>${escapeHtml(model.name)}</h3>
            <p class="text-muted">${escapeHtml(model.brand)} | ${escapeHtml(model.description)}</p>

            <model-viewer
              src="${glb}"
              ios-src="${usdz}"
              alt="${escapeHtml(model.name)}"
              ar
              ar-modes="webxr scene-viewer quick-look"
              ar-scale="fixed"
              camera-controls
              auto-rotate
              shadow-intensity="1"
              exposure="1"
              environment-image="neutral">

              <button slot="ar-button" class="ar-button">
                เปิดดูแบบ AR
              </button>

            </model-viewer>

            <div class="alert alert-info mt-3 text-start">
              <b>วิธีใช้งาน:</b><br>
              1. หมุนดูโมเดลได้บนหน้าเว็บ<br>
              2. กดปุ่ม “เปิดดูแบบ AR” บนมือถือ<br>
              3. ส่องพื้นหรือโต๊ะ แล้ววางโมเดล
            </div>

          </div>
        </div>
      `;
    }
  }
</script>

</body>
</html>
