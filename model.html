<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Model Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="assets/data/models.js"></script>

  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    .main-card {
      border: none;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .model-img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      background: #e9ecef;
    }

    .menu-btn {
      border-radius: 50px;
      padding: 14px;
      font-size: 18px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="container py-4">

  <a href="index.html" class="btn btn-secondary mb-3">← Back</a>

  <div id="content"></div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id"));

  const model = models.find(m => m.id === id);
  const content = document.getElementById("content");

  if (!model) {
    content.innerHTML = `<div class="alert alert-danger">ไม่พบข้อมูล Model</div>`;
  } else {
    document.title = model.name;

    content.innerHTML = `
      <div class="card main-card">
        <img src="${model.image}" class="model-img" alt="${model.name}">

        <div class="card-body text-center">
          <h1>${model.name}</h1>
          <h5 class="text-muted">${model.brand}</h5>
          <p>${model.description}</p>

          <hr>

          <a href="${model.catalog}" target="_blank" class="btn btn-outline-primary w-100 menu-btn">
            Catalog
          </a>

          <a href="${model.video}" target="_blank" class="btn btn-outline-danger w-100 menu-btn">
            Video
          </a>
          
          <a href="${model.spec}" target="_blank" class="btn btn-outline-success w-100 menu-btn">
            Spec
          </a>
          
          <a href="#" class="btn btn-primary w-100 menu-btn">
            Model AR
          </a>
        </div>
      </div>
    `;
  }
</script>

</body>
</html>
